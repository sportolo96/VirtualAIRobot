services:
  redis:
    image: redis:7-alpine

  api:
    build: .
    command: python -m src.interfaces.http.server
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: runs
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-5.4}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEFAULT_VIEWPORT_WIDTH: ${DEFAULT_VIEWPORT_WIDTH:-1080}
      DEFAULT_VIEWPORT_HEIGHT: ${DEFAULT_VIEWPORT_HEIGHT:-1920}
      ARTIFACT_ROOT: /app/artifacts
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 8000
    depends_on:
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts

  worker:
    build: .
    command: python -m src.interfaces.worker.worker
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: runs
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-5.4}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEFAULT_VIEWPORT_WIDTH: ${DEFAULT_VIEWPORT_WIDTH:-1080}
      DEFAULT_VIEWPORT_HEIGHT: ${DEFAULT_VIEWPORT_HEIGHT:-1920}
      ARTIFACT_ROOT: /app/artifacts
      DISPLAY: :99
      BROWSER_BINARY: chromium
    shm_size: "1gb"
    depends_on:
      - redis
    volumes:
      - ./artifacts:/app/artifacts
