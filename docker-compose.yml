services:
  redis:
    image: redis:7-alpine

  api:
    build: .
    command: python -m src.interfaces.http.server
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: runs
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-5.4}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      API_AUTH_ENABLED: ${API_AUTH_ENABLED:-false}
      API_AUTH_KEY: ${API_AUTH_KEY:-}
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-false}
      WEBHOOK_TIMEOUT_SEC: ${WEBHOOK_TIMEOUT_SEC:-10}
      WEBHOOK_MAX_RETRIES: ${WEBHOOK_MAX_RETRIES:-3}
      WEBHOOK_RETRY_BACKOFF_SEC: ${WEBHOOK_RETRY_BACKOFF_SEC:-1.0}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-}
      WEBHOOK_DEAD_LETTER_DIR: ${WEBHOOK_DEAD_LETTER_DIR:-/app/artifacts/dead_letters}
      DEFAULT_VIEWPORT_WIDTH: ${DEFAULT_VIEWPORT_WIDTH:-1080}
      DEFAULT_VIEWPORT_HEIGHT: ${DEFAULT_VIEWPORT_HEIGHT:-1920}
      ARTIFACT_ROOT: /app/artifacts
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 8000
    depends_on:
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts

  worker:
    build: .
    command: python -m src.interfaces.worker.worker
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: runs
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-5.4}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-false}
      WEBHOOK_TIMEOUT_SEC: ${WEBHOOK_TIMEOUT_SEC:-10}
      WEBHOOK_MAX_RETRIES: ${WEBHOOK_MAX_RETRIES:-3}
      WEBHOOK_RETRY_BACKOFF_SEC: ${WEBHOOK_RETRY_BACKOFF_SEC:-1.0}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-}
      WEBHOOK_DEAD_LETTER_DIR: ${WEBHOOK_DEAD_LETTER_DIR:-/app/artifacts/dead_letters}
      DEFAULT_VIEWPORT_WIDTH: ${DEFAULT_VIEWPORT_WIDTH:-1080}
      DEFAULT_VIEWPORT_HEIGHT: ${DEFAULT_VIEWPORT_HEIGHT:-1920}
      ARTIFACT_ROOT: /app/artifacts
      DISPLAY: :99
      BROWSER_BINARY: chromium
    shm_size: "1gb"
    depends_on:
      - redis
    volumes:
      - ./artifacts:/app/artifacts
