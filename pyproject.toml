[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
asyncio_default_fixture_loop_scope = "function"

[tool.ruff]
line-length = 100
target-version = "py39"
exclude = [".venv", ".idea", "artifacts"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.9"
files = ["src", "tests"]
ignore_missing_imports = true
warn_unused_configs = true
check_untyped_defs = true
exclude = ["^\\.venv/", "^artifacts/"]
